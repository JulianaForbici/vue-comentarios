<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Todo List</title>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            template: `
                <div class="container">
                    <h1 class="text-center">Comentários</h1>
                    <hr />
                    
                    <div class="form-todo form-group">
                        <p>
                            <input
                                placeholder="nome"
                                type="text"
                                name="author"
                                class="form-control"
                                v-model="name"
                            />
                        </p>
                        <p>
                            <textarea
                                placeholder="Comentário"
                                name="message"
                                class="form-control"
                                v-model="message"
                            ></textarea>
                        </p>
                        <button @click="addComment" type="button" class="btn btn-primary">
                            Comentar
                        </button>
                    </div>

                    <div class="list-group mt-3">
                        <div
                            class="list-group-item"
                            v-for="(comment, index) in allComments"
                            :key="index"
                        >
                            <span class="comment__author">
                                Autor: <strong>{{ comment.name }}</strong>
                            </span>
                            <p>{{ comment.message }}</p>
                            <div>
                                <a href="#" title="Excluir" @click.prevent="removeComment(index)">
                                    Excluir
                                </a>
                            </div>
                        </div>
                    </div>

                    <hr />
                </div>
            `,
            data() {
                return {
                    comments: [
                        {
                            name: "Juliana",
                            message: "Mensagem"
                        }
                    ],
                    name: '',
                    message: ''
                }
            },
            computed: {
                allComments() {
                    return this.comments.map(comment => ({
                        ...comment,
                        name: comment.name.trim() === '' ? 'Anônimo' : comment.name
                    }));
                }
            },
            watch: {
                comments(val) {
                    console.log('val', val)
                }
            },
            methods: {
                addComment() {
                    if (this.message.trim() === '') {
                        return;
                    }

                    this.comments.push({
                        name: this.name,
                        message: this.message
                    });

                    this.name = '';
                    this.message = '';
                },
                removeComment(index) {
                    this.comments.splice(index, 1);
                }
            }
        })
    </script>
</body>
</html>
